# research-view 前端容器(台北侧)。这台机服务多,用容器隔离。
# 数据:阿里云每日同步 dashboard.json 到 ./data,挂载进容器,不用重建镜像。
services:
  web:
    build: ./web
    image: research-view-web:latest
    container_name: research-view-web
    restart: unless-stopped
    ports:
      - "8092:80"          # 宿主 8092(8090 已被 Crucible 占用)→ 容器 nginx 80
    volumes:
      - ./webdata:/usr/share/nginx/html/data:ro   # 前端实时数据(阿里云同步 dashboard.json 到此),只读挂载
    depends_on:
      - chat               # nginx 启动时解析 chat 主机名,需 chat 先起

  # chat 问答后端:DeepSeek两段式(选片→回答),只读 webdata。不暴露宿主端口,仅 nginx 内网反代。
  chat:
    build: ./chat
    image: research-view-chat:latest
    container_name: research-view-chat
    restart: unless-stopped
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK:-}   # 告警走平台同一个值班机器人,未配置=静默跳过
      - FEISHU_SECRET=${FEISHU_SECRET:-}
      - VAPID_SUB=${VAPID_SUB:-mailto:admin@example.com}   # Web Push 联系标识(.env 配真实邮箱)
    volumes:
      - ./webdata:/data:ro      # 与前端同源数据
      - ./logs/chat:/state      # 每日用量计数+推送订阅落盘(重启不清零;宿主 push_alerts.py 共读订阅)
      - ./vapid_private.pem:/app/vapid_private.pem:ro   # Web Push VAPID 私钥(gitignore,两侧共用)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip:dashboard.json/trends.json 是重复性强的 JSON,压缩 ~4-5x
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # 静态资源
    location /assets/ {
        expires 7d;
        access_log off;
    }

    # 数据文件不缓存(每日更新,挂载卷)
    location /data/ {
        add_header Cache-Control "no-store";
    }

    # SPA:未命中的路由回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

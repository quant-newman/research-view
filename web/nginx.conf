# 平台防护(2026-07-03,使用者拍板「只加固不加门」——保持无认证公开,做反爬/防洪加固):
# ①限流:每 IP 10r/s(突发20)+ 并发连接 20——够真人看盘(整页加载约5请求),挡批量爬取/小流量攻击;
# ②bot/脚本 UA 与空 UA 一律 403(curl 调试需 -A "Mozilla/5.0");
# ③robots.txt 全站禁抓(搜索引擎不索引=不被动暴露);
# ④隐藏 nginx 版本 + 基础安全头。真正的大规模 DDoS 非 nginx 层能挡,那是云 WAF 的事(未购)。
# 此文件被 include 进 http 上下文,zone/map 放 server 外合法。
limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=peraddr:10m;
# chat 问答单独更紧的限速(每次都是 LLM 调用花钱):每 IP 12次/分;后端 guard.py 另有每日熔断
limit_req_zone $binary_remote_addr zone=chatip:10m rate=12r/m;
# push 订阅端点单独更紧的限速(subscribe 是写盘操作,正常一台设备只订阅一次):每 IP 10次/分
limit_req_zone $binary_remote_addr zone=pushlim:10m rate=10r/m;

map $http_user_agent $bad_ua {
    default 0;
    "" 1;
    ~*(bot|spider|crawl|scrapy|python|curl|wget|go-http|java|libwww|httpclient|okhttp|aiohttp) 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 宿主 443(HTTPS 域名)反代进来时源IP=docker网关,还原真实客户端IP供限流分桶;
    # 只信任容器网段来源的 X-Real-IP——直连 8092 的外部客户端伪造此头无效。
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;

    server_tokens off;
    limit_req zone=perip burst=20 nodelay;
    limit_req_status 429;
    limit_conn peraddr 20;
    limit_conn_status 429;

    if ($bad_ua) { return 403; }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # 隐藏文件(.git 等,镜像里本就没有,纵深防御)
    location ~ /\. { deny all; }

    # gzip:dashboard.json/trends.json 是重复性强的 JSON,压缩 ~4-5x
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # 静态资源
    location /assets/ {
        expires 7d;
        access_log off;
    }

    # 数据文件不缓存(每日更新,挂载卷)
    location /data/ {
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options nosniff always;
    }

    # chat 问答反代(SSE 流式:关 buffering;读超时放宽到 DeepSeek 思考+回答量级)
    location /api/chat {
        limit_req zone=chatip burst=5 nodelay;
        proxy_pass http://chat:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Web Push 订阅(chat 容器托管;异动推送发送在台北宿主脚本。
    # 群发测试端点 /api/push/test 2026-07-10 已删除——公网零鉴权可对全部订阅者刷屏)
    location /api/push {
        limit_req zone=pushlim burst=5 nodelay;
        proxy_pass http://chat:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA:未命中的路由回退 index.html。expires -1=协商缓存——index.html 无缓存头时
    # 手机浏览器按启发式缓存旧 bundle,部署后看不到新功能(assets/data 已各有专属块)。
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
